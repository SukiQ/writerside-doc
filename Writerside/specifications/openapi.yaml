                          description: "服务主机端口"
                        address:
                          type: "string"
                          description: "邮箱地址"
                        password:
                          type: "string"
                          description: "邮箱密码"
                        protocol:
                          type: "string"
                          description: "{smtp=smtp协议, pop3=pop3协议}"
                          enum:
                          - "smtp"
                          - "pop3"
                        ssl:
